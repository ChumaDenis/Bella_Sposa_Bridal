<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Navy background with rounded corners -->
  <rect width="100" height="100" rx="14" fill="#1B2C42"/>

  <!-- Gold inner border -->
  <rect x="4" y="4" width="92" height="92" rx="11" fill="none" stroke="#B8975A" stroke-width="1.2"/>

  <!-- BS monogram — Cormorant Garamond italic -->
  <text
    x="49" y="67"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-style="italic"
    font-weight="400"
    font-size="52"
    fill="#FDFAF6"
    text-anchor="middle"
    letter-spacing="2"
  >BS</text>
</svg>
